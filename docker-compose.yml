services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ifec_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./airlineproject-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/ifec_db
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./airlineproject-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: